version: "3.9"

networks:
  microservices-net:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:

services:
  # ─────────────────────────────────────────
  # DATABASES
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: ms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: products_db
      POSTGRES_MULTIPLE_DATABASES: products_db,auth_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-multi-db.sh:/docker-entrypoint-initdb.d/init-multi-db.sh
    ports:
      - "5432:5432"
    networks: [microservices-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    container_name: ms_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret
      MONGO_INITDB_DATABASE: orders_db
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks: [microservices-net]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # APPLICATION SERVICES
  # ─────────────────────────────────────────
  product-service:
    build: ./product-service
    container_name: ms_product
    restart: unless-stopped
    env_file: ./product-service/.env.example
    environment:
      DATABASE_URL: postgresql://admin:secret@postgres:5432/products_db
      NODE_ENV: production
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [microservices-net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  order-service:
    build: ./order-service
    container_name: ms_order
    restart: unless-stopped
    env_file: ./order-service/.env.example
    environment:
      MONGODB_URI: mongodb://admin:secret@mongo:27017/orders_db?authSource=admin
      NODE_ENV: production
      PORT: 3002
    ports:
      - "3002:3002"
    depends_on:
      mongo:
        condition: service_healthy
    networks: [microservices-net]

  auth-service:
    build: ./auth-service
    container_name: ms_auth
    restart: unless-stopped
    env_file: ./auth-service/.env.example
    environment:
      AUTH_DATABASE_URL: postgresql://admin:secret@postgres:5432/auth_db
      JWT_SECRET: docker-compose-jwt-secret-change-in-production
      NODE_ENV: production
      PORT: 3003
    ports:
      - "3003:3003"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [microservices-net]

  api-gateway:
    build: ./api-gateway
    container_name: ms_gateway
    restart: unless-stopped
    environment:
      PRODUCT_SERVICE_URL: http://product-service:3001
      ORDER_SERVICE_URL: http://order-service:3002
      AUTH_SERVICE_URL: http://auth-service:3003
      JWT_SECRET: docker-compose-jwt-secret-change-in-production
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - product-service
      - order-service
      - auth-service
    networks: [microservices-net]